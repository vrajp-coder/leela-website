  <div class="photo photo1"  onclick="openCarousel(0,0)"><div class="view-more"><span class="shoot-name">D</span>         <span class="view-more-text">View More</span></div></div>

  <video id="carouselVideo" controls style="display:none;"></video>
  <div class="arrow right" onclick="changeImage(1)">&#10095;</div>
</div>
